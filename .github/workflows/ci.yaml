name: ecommerce-ci

on:
  push:
    branches:
      - main

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          file: ./docker/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:${{ github.run_number }}

  update-manifest:
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update image tag in deployment
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:${{ github.run_number }}|" kubernetes/frontend-deployment.yaml

      - name: Commit and Push changes
        run: |
          git config --global user.email "ilyesoueslati15@gmail.com"
          git config --global user.name "ilyesoueslati"
          git add kubernetes/frontend-deployment.yaml
          git commit -m "Update frontend image tag"
          git push
